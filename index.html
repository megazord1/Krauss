<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NaCadeira - Gestão de Barbearia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { font-size: 16px !important; color: #18181b !important; background-color: #ffffff !important; }
        .btn-horario:disabled { background-color: #f4f4f5; color: #d4d4d8; cursor: not-allowed; opacity: 0.6; }
        .horario-selecionado { background-color: #f59e0b !important; color: white !important; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-800">

    <header class="bg-zinc-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">Na<span class="text-amber-500">Cadeira</span></h1>
            <nav class="flex gap-2 items-center">
                <button onclick="switchTab('cliente')" class="px-3 py-2 text-sm font-bold">Agendar</button>
                <button id="btn-admin-nav" onclick="verificarLogin()" class="bg-amber-500 px-4 py-2 rounded-lg text-zinc-900 font-bold text-sm">Admin</button>
                <button id="btn-sair" onclick="logout()" class="hidden bg-red-500 text-white px-3 py-2 rounded-lg font-bold text-xs">Sair</button>
            </nav>
        </div>
    </header>

    <!-- ABA LOGIN -->
    <main id="tab-login" class="tab-content p-6">
        <div class="max-w-sm mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10 border border-zinc-200">
            <h2 class="text-2xl font-bold mb-6 text-center">Acesso Admin</h2>
            <div class="space-y-4">
                <input type="text" id="login-user" placeholder="Usuário" class="w-full border p-3 rounded-xl outline-none focus:border-amber-500">
                <input type="password" id="login-pass" placeholder="Senha" class="w-full border p-3 rounded-xl outline-none focus:border-amber-500">
                <button onclick="tentarLogin()" class="w-full bg-zinc-900 text-white py-4 rounded-xl font-bold uppercase">Entrar</button>
            </div>
        </div>
    </main>

    <!-- ABA CLIENTE (AGENDAMENTO) -->
    <main id="tab-cliente" class="tab-content active p-4">
        <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl border border-zinc-200 overflow-hidden">
            <div class="bg-amber-500 p-8 text-zinc-900 text-center">
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Agendar Horário</h2>
            </div>
            
            <form id="form-agendamento" onsubmit="realizarAgendamento(event)" class="p-6 space-y-4">
                <input type="text" id="cliente-nome" placeholder="Seu Nome" required class="w-full border-2 p-3 rounded-2xl outline-none">
                
                <!-- NOVO CAMPO TELEFONE -->
                <input type="tel" id="cliente-fone" placeholder="Seu WhatsApp (00) 00000-0000" maxlength="15" onkeyup="mascaraFone(this)" required class="w-full border-2 p-3 rounded-2xl outline-none">
                
                <select id="select-servicos" required class="w-full border-2 p-3 rounded-2xl outline-none bg-white font-medium"></select>
                <select id="select-barbeiros-cliente" onchange="gerarGradeHorarios()" required class="w-full border-2 border-amber-500 p-3 rounded-2xl outline-none bg-white font-black uppercase text-xs"></select>
                <input type="date" id="agendamento-dia" required onchange="gerarGradeHorarios()" class="w-full border-2 p-3 rounded-2xl outline-none font-bold">
                <div id="grade-horarios" class="grid grid-cols-3 gap-2"></div>
                <input type="hidden" id="horario-selecionado">
                <button type="submit" id="btn-confirmar" disabled class="w-full bg-zinc-300 text-white py-5 rounded-2xl font-black uppercase tracking-widest">Confirmar Agendamento</button>
            </form>
        </div>
    </main>

    <!-- ABA ADMIN -->
    <main id="tab-admin" class="tab-content p-4">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-4 gap-6">
            
            <section class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-200">
                <h3 class="font-black mb-4 text-amber-600 text-xs uppercase tracking-tighter">Equipe</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="novo-barbeiro-nome" placeholder="Nome" class="w-full border p-3 rounded-xl text-sm outline-none">
                    <button onclick="adicionarBarbeiro()" class="bg-zinc-900 text-white px-4 rounded-xl font-bold">+</button>
                </div>
                <div id="lista-barbeiros-admin" class="space-y-3"></div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-200">
                <h3 class="font-black mb-4 text-amber-600 text-xs uppercase tracking-tighter">Serviços</h3>
                <div id="lista-servicos-admin" class="space-y-3"></div>
            </section>
            
            <section class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-zinc-200">
                <h3 class="font-black mb-4 text-zinc-400 text-xs uppercase italic tracking-widest">Agenda Hoje</h3>
                <div id="lista-agendamentos" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://sryebanfwnbmsazsyxdc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TkSVYwSMcyVn5k4byo7cnQ_4ULn_jCB';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLogged = false;

        // MÁSCARA DE TELEFONE
        function mascaraFone(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/^(\2)(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            i.value = v;
        }

        function calcularAtraso(data, hora) {
            const agora = new Date();
            const agendado = new Date(`${data}T${hora}`);
            if (agora > agendado) {
                const diff = Math.floor((agora - agendado) / 60000);
                return diff > 0 ? diff : null;
            }
            return null;
        }

        async function switchTab(tab) {
            if (tab === 'admin' && !isLogged) tab = 'login';
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderizarTudo();
        }

        function verificarLogin() { isLogged ? switchTab('admin') : switchTab('login'); }
        
        function tentarLogin() {
            if (document.getElementById('login-user').value === "admin" && document.getElementById('login-pass').value === "1234") {
                isLogged = true;
                document.getElementById('btn-sair').classList.remove('hidden');
                document.getElementById('btn-admin-nav').classList.add('hidden');
                switchTab('admin');
            } else alert("Senha incorreta!");
        }

        function logout() {
            isLogged = false;
            document.getElementById('btn-sair').classList.add('hidden');
            document.getElementById('btn-admin-nav').classList.remove('hidden');
            switchTab('cliente');
        }

        async function renderizarTudo() {
            const { data: barbs } = await _supabase.from('barbeiros').select('*').order('nome');
            if (barbs) {
                document.getElementById('select-barbeiros-cliente').innerHTML = '<option value="" disabled selected>Escolha o Barbeiro</option>' + barbs.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
                document.getElementById('lista-barbeiros-admin').innerHTML = barbs.map(b => `<div class="flex justify-between bg-zinc-50 p-3 rounded-xl border text-xs font-bold uppercase"><span>${b.nome}</span><button onclick="removerBarbeiro(${b.id})" class="text-red-400">Remover</button></div>`).join('');
            }

            const { data: servs } = await _supabase.from('servicos').select('*').order('nome');
            if (servs) {
                document.getElementById('select-servicos').innerHTML = '<option value="" disabled selected>Escolha o Serviço</option>' + servs.map(s => `<option value="${s.nome}">${s.nome} - R$ ${s.preco}</option>`).join('');
                document.getElementById('lista-servicos-admin').innerHTML = servs.map(s => `<div class="bg-zinc-50 p-3 rounded-xl border flex justify-between items-center text-[10px] font-black uppercase"><span>${s.nome} <span class="text-amber-600 block">R$ ${s.preco}</span></span><button onclick="removerServico(${s.id})" class="text-red-400">✕</button></div>`).join('');
            }

            const { data: agends } = await _supabase.from('agendamentos').select('*').order('dia').order('hora');
            if (agends) {
                document.getElementById('lista-agendamentos').innerHTML = agends.map(a => {
                    const min = calcularAtraso(a.dia, a.hora);
                    const atrasado = min !== null;
                    const foneLimpo = a.telefone.replace(/\D/g, "");
                    const msgWpp = encodeURIComponent(`Olá ${a.cliente}, confirmamos seu horário hoje às ${a.hora.substring(0,5)} para ${a.servico}.`);
                    
                    return `
                    <div class="p-4 border-l-8 ${atrasado ? 'border-red-500 bg-red-50' : 'border-amber-500 bg-white'} rounded-2xl shadow-sm flex justify-between items-center border">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] font-black ${atrasado ? 'text-red-600' : 'text-amber-600'} uppercase">${a.dia.split('-').reverse().join('/')} às ${a.hora.substring(0,5)}</span>
                                ${atrasado ? `<span class="bg-red-600 text-white text-[8px] px-2 py-0.5 rounded-full font-black pulse-red uppercase">Atrasado ${min}m</span>` : ''}
                            </div>
                            <h4 class="font-black text-zinc-900 uppercase italic tracking-tighter">${a.cliente}</h4>
                            <p class="text-[10px] text-zinc-500 font-bold uppercase">${a.servico} | Prof: ${a.barbeiro}</p>
                            
                            <!-- BOTÃO WHATSAPP NO ADMIN -->
                            <a href="https://wa.me/55${foneLimpo}?text=${msgWpp}" target="_blank" class="inline-flex items-center gap-1 mt-2 bg-green-100 text-green-700 text-[9px] font-black px-3 py-1 rounded-full uppercase hover:bg-green-200 transition-colors">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793 0-.853.448-1.273.607-1.446.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86.174.088.275.073.376-.044.101-.116.433-.506.548-.68.116-.174.231-.145.39-.087s1.011.477 1.184.564c.173.087.289.129.332.202.043.073.043.423-.101.827z"/></svg>
                                WhatsApp
                            </a>
                        </div>
                        <button onclick="removerAgendamento(${a.id})" class="text-zinc-300 hover:text-red-500 text-2xl transition-all">✕</button>
                    </div>`;
                }).join('') || '<p class="text-zinc-400 italic text-center py-10 text-xs">Sem horários agendados.</p>';
            }
        }

        async function gerarGradeHorarios() {
            const d = document.getElementById('agendamento-dia').value;
            const b = document.getElementById('select-barbeiros-cliente').value;
            if (!d || !b) return;
            const { data: ocupados } = await _supabase.from('agendamentos').select('hora').eq('dia', d).eq('barbeiro', b);
            const horasOcupadas = ocupados ? ocupados.map(o => o.hora.substring(0, 5)) : [];
            const grade = document.getElementById('grade-horarios');
            grade.innerHTML = '';
            for (let h = 10; h <= 19; h++) {
                const hs = `${h.toString().padStart(2, '0')}:00`;
                const oc = horasOcupadas.includes(hs);
                const btn = document.createElement('button');
                btn.type = 'button'; btn.innerText = hs;
                btn.className = `p-3 rounded-2xl border-2 font-black text-xs transition-all btn-horario ${oc ? '' : 'border-amber-500 text-amber-600 hover:bg-amber-50'}`;
                btn.disabled = oc;
                btn.onclick = () => {
                    document.querySelectorAll('.btn-horario').forEach(x => x.classList.remove('horario-selecionado'));
                    btn.classList.add('horario-selecionado');
                    document.getElementById('horario-selecionado').value = hs;
                    document.getElementById('btn-confirmar').disabled = false;
                    document.getElementById('btn-confirmar').className = "w-full bg-zinc-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest";
                };
                grade.appendChild(btn);
            }
        }

        async function realizarAgendamento(e) {
            e.preventDefault();
            const d = {
                cliente: document.getElementById('cliente-nome').value,
                telefone: document.getElementById('cliente-fone').value, // NOVO CAMPO
                servico: document.getElementById('select-servicos').value,
                barbeiro: document.getElementById('select-barbeiros-cliente').value,
                dia: document.getElementById('agendamento-dia').value,
                hora: document.getElementById('horario-selecionado').value
            };
            await _supabase.from('agendamentos').insert([d]);
            alert("Agendado com sucesso!");
            e.target.reset();
            document.getElementById('grade-horarios').innerHTML = '';
            renderizarTudo();
        }

        async function removerAgendamento(id) { if(confirm("Concluir atendimento?")) { await _supabase.from('agendamentos').delete().eq('id', id); renderizarTudo(); } }
        async function adicionarBarbeiro() { const n = document.getElementById('novo-barbeiro-nome').value; if(n) { await _supabase.from('barbeiros').insert([{ nome: n }]); document.getElementById('novo-barbeiro-nome').value=''; renderizarTudo(); } }
        async function removerBarbeiro(id) { if(confirm("Remover?")) { await _supabase.from('barbeiros').delete().eq('id', id); renderizarTudo(); } }
        async function removerServico(id) { if(confirm("Remover?")) { await _supabase.from('servicos').delete().eq('id', id); renderizarTudo(); } }

        setInterval(renderizarTudo, 60000);
        window.onload = renderizarTudo;
    </script>
</body>
</html>
