<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotoExpress SaaS - Business</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.95);
            --primary-blue: #3b82f6;
            --text-main: #f8fafc;
            --accent-green: #10b981;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overscroll-behavior: none;
        }

        .glass-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; 
            padding: 1.2rem; 
            margin-bottom: 1rem;
        }

        .form-control { 
            background-color: #1e293b !important; 
            border: 1px solid #334155 !important; 
            color: #fff !important;
            padding: 12px;
            font-size: 16px !important;
        }

        .btn-primary-custom { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
            border: none; padding: 15px; font-weight: bold; border-radius: 12px; 
            width: 100%; color: white; margin-top: 5px;
        }

        .price-tag {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .chat-box { 
            background: #0a0f1d; 
            border-radius: 12px; 
            height: 180px; 
            overflow-y: auto; 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            border: 1px solid #334155;
        }

        .msg { margin-bottom: 8px; padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 0.9rem; }
        .msg-me { background: var(--primary-blue); align-self: flex-end; color: white; }
        .msg-other { background: #1e293b; align-self: flex-start; color: white; }

        #map { height: 250px; width: 100%; border-radius: 15px; z-index: 1; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authSection" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 400px;">
        <h2 class="text-center text-primary fw-bold mb-4">MotoExpress</h2>
        <input type="email" id="loginEmail" class="form-control mb-2" placeholder="E-mail">
        <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Senha">
        <button id="btnLoginAction" class="btn-primary-custom">ENTRAR</button>
    </div>
</div>

<div id="mainApp" class="container py-3" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="fw-bold text-primary">MOTOEXPRESS</span>
        <button id="btnLogout" class="btn btn-sm btn-outline-danger">Sair</button>
    </div>

    <!-- AREA CLIENTE -->
    <div id="areaCliente" class="hidden">
        <div class="glass-card">
            <input type="text" id="origem" class="form-control mb-2" placeholder="Origem (Ex: Rua A, 10)">
            <input type="text" id="destino" class="form-control mb-3" placeholder="Destino (Ex: Rua B, 50)">
            
            <div id="previewPreco" class="price-tag hidden">
                Valor Estimado: R$ <span id="valorTxt">0,00</span>
            </div>

            <button id="btnCalcular" class="btn btn-outline-primary w-100 mb-2">CALCULAR PREÇO</button>
            <button id="btnSolicitar" class="btn-primary-custom hidden">CONFIRMAR E CHAMAR</button>
        </div>
        
        <div id="statusPedidoCliente"></div>

        <div id="containerChatCliente" class="glass-card hidden">
            <div id="boxChatCliente" class="chat-box mb-2"></div>
            <div class="input-group">
                <input type="text" id="inputChatCliente" class="form-control" placeholder="Mensagem...">
                <button class="btn btn-primary" onclick="enviarMensagem('cliente')"><i class="bi bi-send"></i></button>
            </div>
        </div>
        <div id="mapContainer" class="hidden"><div id="map"></div></div>
    </div>

    <!-- AREA MOTOBOY -->
    <div id="areaMotoboy" class="hidden">
        <div id="minhaCorridaAtiva"></div>
        <div id="containerChatMotoboy" class="glass-card hidden">
            <div id="boxChatMotoboy" class="chat-box mb-2"></div>
            <div class="input-group">
                <input type="text" id="inputChatMotoboy" class="form-control" placeholder="Mensagem...">
                <button class="btn btn-primary" onclick="enviarMensagem('motoboy')"><i class="bi bi-send"></i></button>
            </div>
        </div>
        <p class="text-warning small fw-bold">ENTREGAS DISPONÍVEIS</p>
        <div id="listaPedidos"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY",
        authDomain: "motoexpress-887ba.firebaseapp.com",
        projectId: "motoexpress-887ba",
        storageBucket: "motoexpress-887ba.appspot.com",
        messagingSenderId: "931221356023",
        appId: "1:931221356023:web:7f6f5e4d3c2b1a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // CONFIGURAÇÃO DE PRECIFICAÇÃO (Ajuste aqui seus ganhos)
    const PRECO_BASE = 5.00;      // Valor mínimo
    const PRECO_KM = 2.00;        // Valor por KM rodado
    const PORCENTAGEM_APP = 0.20; // Sua comissão (20%)

    let map, marker, pedidoAtivoId = null;
    let precoCalculado = 0;

    onAuthStateChanged(auth, async u => {
        if(u) {
            const uDoc = await getDoc(doc(db, "usuarios", u.uid));
            if(uDoc.exists()) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                if(uDoc.data().tipo === 'cliente') {
                    document.getElementById('areaCliente').classList.remove('hidden');
                    monitorarPedidosCliente(u.uid);
                } else {
                    document.getElementById('areaMotoboy').classList.remove('hidden');
                    iniciarFluxoMotoboy();
                }
            }
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    // Função para calcular distância via OSRM (Gratuito)
    async function calcularDistancia(origem, destino) {
        try {
            // Aqui converteríamos endereços em coordenadas. 
            // Para simplificar e rodar agora, usaremos um cálculo simulado baseado em geocodificação simples ou coordenadas.
            // Em um sistema real, você usaria: fetch(`https://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}`)
            
            const kmFake = (Math.random() * 10) + 1; // Simulação de 1 a 11km
            const total = PRECO_BASE + (kmFake * PRECO_KM);
            return total;
        } catch (e) { return 7.00; }
    }

    document.getElementById('btnCalcular').addEventListener('click', async () => {
        const btn = document.getElementById('btnCalcular');
        btn.innerText = "Calculando...";
        
        precoCalculado = await calcularDistancia();
        
        document.getElementById('valorTxt').innerText = precoCalculado.toLocaleString('pt-br', {minimumFractionDigits: 2});
        document.getElementById('previewPreco').classList.remove('hidden');
        document.getElementById('btnSolicitar').classList.remove('hidden');
        btn.innerText = "RECALCULAR";
    });

    document.getElementById('btnSolicitar').addEventListener('click', async () => {
        const o = document.getElementById('origem').value, d = document.getElementById('destino').value;
        if(o && d) {
            const lucroApp = precoCalculado * PORCENTAGEM_APP;
            const ganhoMotoboy = precoCalculado - lucroApp;

            await addDoc(collection(db, "pedidos"), {
                origem: o,
                destino: d,
                valorTotal: precoCalculado,
                comissaoApp: lucroApp,
                valorMotoboy: ganhoMotoboy,
                status: "pendente",
                clienteId: auth.currentUser.uid,
                data: serverTimestamp()
            });
            
            document.getElementById('previewPreco').classList.add('hidden');
            document.getElementById('btnSolicitar').classList.add('hidden');
        }
    });

    function monitorarPedidosCliente(uid) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", uid)), snap => {
            const container = document.getElementById('statusPedidoCliente');
            container.innerHTML = "";
            let ativa = false;
            snap.forEach(d => {
                const p = d.data();
                if(p.status !== 'finalizado') {
                    if(p.status === 'aceito') {
                        ativa = true; pedidoAtivoId = d.id;
                        document.getElementById('containerChatCliente').classList.remove('hidden');
                        document.getElementById('mapContainer').classList.remove('hidden');
                        monitorarChat(d.id, 'boxChatCliente');
                        carregarMapa(p.motoboyId);
                    }
                    container.innerHTML += `
                        <div class="glass-card border-primary">
                            <div class="d-flex justify-content-between">
                                <span class="badge bg-primary">${p.status.toUpperCase()}</span>
                                <span class="text-success fw-bold">R$ ${p.valorTotal.toFixed(2)}</span>
                            </div>
                            <small class="d-block mt-2">${p.destino}</small>
                        </div>`;
                }
            });
            if(!ativa) {
                document.getElementById('containerChatCliente').classList.add('hidden');
                document.getElementById('mapContainer').classList.add('hidden');
            }
        });
    }

    function iniciarFluxoMotoboy() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: p.coords.latitude, lng: p.coords.longitude });
            }, null, { enableHighAccuracy: true });
        }

        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente")), snap => {
            const l = document.getElementById('listaPedidos'); l.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                l.innerHTML += `
                    <div class="glass-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-success fw-bold">Ganhos: R$ ${p.valorMotoboy.toFixed(2)}</span>
                            <small class="text-dim">Total: R$ ${p.valorTotal.toFixed(2)}</small>
                        </div>
                        <p class="small mt-2 mb-2">Destino: ${p.destino}</p>
                        <button class="btn btn-success btn-sm w-100" onclick="aceitar('${d.id}')">ACEITAR CORRIDA</button>
                    </div>`;
            });
        });

        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const c = document.getElementById('minhaCorridaAtiva');
            c.innerHTML = "";
            if(!snap.empty) {
                const d = snap.docs[0];
                pedidoAtivoId = d.id;
                document.getElementById('containerChatMotoboy').classList.remove('hidden');
                monitorarChat(d.id, 'boxChatMotoboy');
                c.innerHTML = `
                    <div class="glass-card border-success">
                        <h6 class="text-success">Em andamento - R$ ${d.data().valorMotoboy.toFixed(2)}</h6>
                        <button class="btn btn-success btn-sm w-100 mt-2" onclick="finalizar('${d.id}')">FINALIZAR E RECEBER</button>
                    </div>`;
            } else {
                document.getElementById('containerChatMotoboy').classList.add('hidden');
                pedidoAtivoId = null;
            }
        });
    }

    // --- FUNÇÕES DE APOIO ---
    function monitorarChat(idPedido, boxId) {
        onSnapshot(query(collection(db, "pedidos", idPedido, "chat"), orderBy("data", "asc")), snap => {
            const box = document.getElementById(boxId); box.innerHTML = "";
            snap.forEach(m => {
                const isMe = m.data().senderId === auth.currentUser.uid;
                box.innerHTML += `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">${m.data().texto}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.enviarMensagem = async (tipo) => {
        const input = document.getElementById(tipo === 'cliente' ? 'inputChatCliente' : 'inputChatMotoboy');
        if(input.value.trim() && pedidoAtivoId) {
            await addDoc(collection(db, "pedidos", pedidoAtivoId, "chat"), {
                texto: input.value, senderId: auth.currentUser.uid, data: serverTimestamp()
            });
            input.value = "";
        }
    };

    function carregarMapa(mid) {
        if (!map) {
            map = L.map('map', { dragging: true, tap: false }).setView([-15, -47], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0, 0]).addTo(map);
        }
        onSnapshot(doc(db, "usuarios", mid), d => {
            if(d.exists() && d.data().lat !== 0) {
                const pos = [d.data().lat, d.data().lng];
                marker.setLatLng(pos);
                map.setView(pos, 16);
            }
        });
    }

    window.aceitar = id => updateDoc(doc(db, "pedidos", id), { status: "aceito", motoboyId: auth.currentUser.uid });
    window.finalizar = id => updateDoc(doc(db, "pedidos", id), { status: "finalizado" });
    document.getElementById('btnLoginAction').addEventListener('click', () => signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginSenha').value).catch(() => {}));
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
