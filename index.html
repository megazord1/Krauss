<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NaCadeira - Gestão de Barbearia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { font-size: 16px !important; color: #18181b !important; background-color: #ffffff !important; }
        .btn-horario:disabled { background-color: #f4f4f5; color: #d4d4d8; cursor: not-allowed; opacity: 0.6; }
        .horario-selecionado { background-color: #f59e0b !important; color: white !important; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-800">

    <header class="bg-zinc-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">Na<span class="text-amber-500">Cadeira</span></h1>
            <nav class="flex gap-2 items-center">
                <button onclick="switchTab('cliente')" class="px-3 py-2 text-sm font-bold">Agendar</button>
                <button id="btn-admin-nav" onclick="verificarLogin()" class="bg-amber-500 px-4 py-2 rounded-lg text-zinc-900 font-bold text-sm">Admin</button>
                <button id="btn-sair" onclick="logout()" class="hidden bg-red-500/10 text-red-500 px-3 py-2 rounded-lg font-bold text-xs border border-red-500/20">Sair</button>
            </nav>
        </div>
    </header>

    <!-- ABA LOGIN (USUÁRIO E SENHA) -->
    <main id="tab-login" class="tab-content p-6">
        <div class="max-w-sm mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10 border">
            <h2 class="text-2xl font-bold mb-6 text-center">Acesso Admin</h2>
            <div class="space-y-4">
                <input type="text" id="login-user" placeholder="Usuário" class="w-full border p-3 rounded-xl outline-none focus:border-amber-500">
                <input type="password" id="login-pass" placeholder="Senha" class="w-full border p-3 rounded-xl outline-none focus:border-amber-500">
                <button onclick="tentarLogin()" class="w-full bg-zinc-900 text-white py-4 rounded-xl font-bold uppercase tracking-widest">Entrar no Painel</button>
            </div>
        </div>
    </main>

    <!-- ABA CLIENTE (AGENDAMENTO) -->
    <main id="tab-cliente" class="tab-content active p-4">
        <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl border border-zinc-200 overflow-hidden">
            <div class="bg-amber-500 p-8 text-zinc-900 text-center">
                <h2 class="text-2xl font-black uppercase italic">Agendar Horário</h2>
                <p class="text-[10px] font-bold opacity-70">RÁPIDO • FÁCIL • ONLINE</p>
            </div>
            
            <form id="form-agendamento" onsubmit="realizarAgendamento(event)" class="p-6 space-y-5">
                <input type="text" id="cliente-nome" placeholder="Seu Nome Completo" required class="w-full border-2 p-3 rounded-2xl outline-none">
                <select id="select-servicos" required class="w-full border-2 p-3 rounded-2xl outline-none bg-white"></select>
                <select id="select-barbeiros-cliente" onchange="gerarGradeHorarios()" required class="w-full border-2 border-amber-500 p-3 rounded-2xl outline-none bg-white font-bold"></select>
                <input type="date" id="agendamento-dia" required onchange="gerarGradeHorarios()" class="w-full border-2 p-3 rounded-2xl outline-none">
                <div id="grade-horarios" class="grid grid-cols-3 gap-2"></div>
                <input type="hidden" id="horario-selecionado">
                <button type="submit" id="btn-confirmar" disabled class="w-full bg-zinc-300 text-white py-5 rounded-2xl font-black uppercase">Confirmar Agendamento</button>
            </form>
        </div>
    </main>

    <!-- ABA ADMIN (PAINEL GERAL) -->
    <main id="tab-admin" class="tab-content p-4">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-4 gap-6">
            
            <!-- Coluna Barbeiros -->
            <section class="bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-black mb-4 text-amber-600 text-xs uppercase tracking-tighter">Barbeiros</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="novo-barbeiro-nome" placeholder="Nome" class="w-full border p-3 rounded-xl text-sm outline-none">
                    <button onclick="adicionarBarbeiro()" class="bg-zinc-900 text-white px-4 rounded-xl font-bold">+</button>
                </div>
                <div id="lista-barbeiros-admin" class="space-y-3"></div>
            </section>

            <!-- Coluna Serviços -->
            <section class="bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-black mb-4 text-amber-600 text-xs uppercase tracking-tighter">Serviços</h3>
                <div class="space-y-3 mb-6">
                    <input type="text" id="novo-servico-nome" placeholder="Nome" class="w-full border p-3 rounded-xl text-sm outline-none">
                    <input type="number" id="novo-servico-preco" placeholder="R$" class="w-full border p-3 rounded-xl text-sm outline-none">
                    <button onclick="adicionarServico()" class="w-full bg-zinc-900 text-white py-3 rounded-xl font-bold uppercase text-[10px]">Adicionar Serviço</button>
                </div>
                <div id="lista-servicos-admin" class="space-y-3 border-t pt-4"></div>
            </section>
            
            <!-- Agenda Geral com Alerta de Atraso -->
            <section class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-black mb-4 text-zinc-400 text-xs uppercase italic">Agenda Hoje</h3>
                <div id="lista-agendamentos" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://sryebanfwnbmsazsyxdc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TkSVYwSMcyVn5k4byo7cnQ_4ULn_jCB';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLogged = false;

        function calcularAtraso(dataAgendada, horaAgendada) {
            const agora = new Date();
            const agendamento = new Date(`${dataAgendada}T${horaAgendada}`);
            if (agora > agendamento) {
                const diffMin = Math.floor((agora - agendamento) / 60000);
                return diffMin > 0 ? diffMin : null;
            }
            return null;
        }

        async function switchTab(tab) {
            if (tab === 'admin' && !isLogged) tab = 'login';
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderizarTudo();
        }

        function verificarLogin() { isLogged ? switchTab('admin') : switchTab('login'); }
        
        function tentarLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            if (user === "admin" && pass === "1234") {
                isLogged = true; 
                document.getElementById('btn-sair').classList.remove('hidden');
                document.getElementById('btn-admin-nav').classList.add('hidden');
                switchTab('admin');
            } else {
                alert("Usuário ou senha inválidos!");
            }
        }

        function logout() {
            isLogged = false;
            document.getElementById('btn-sair').classList.add('hidden');
            document.getElementById('btn-admin-nav').classList.remove('hidden');
            switchTab('cliente');
        }

        async function renderizarTudo() {
            // Barbeiros
            const { data: barbs } = await _supabase.from('barbeiros').select('*').order('nome');
            if (barbs) {
                document.getElementById('select-barbeiros-cliente').innerHTML = '<option value="" disabled selected>Escolha o Barbeiro</option>' + barbs.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
                document.getElementById('lista-barbeiros-admin').innerHTML = barbs.map(b => `<div class="flex justify-between items-center bg-zinc-50 p-3 rounded-2xl border text-sm font-bold"><span>${b.nome}</span><button onclick="removerBarbeiro(${b.id})" class="text-red-400">Remover</button></div>`).join('');
            }

            // Serviços com Editar
            const { data: servs } = await _supabase.from('servicos').select('*').order('nome');
            if (servs) {
                document.getElementById('select-servicos').innerHTML = '<option value="" disabled selected>Escolha o Serviço</option>' + servs.map(s => `<option value="${s.nome}">${s.nome} - R$ ${s.preco}</option>`).join('');
                document.getElementById('lista-servicos-admin').innerHTML = servs.map(s => `
                    <div class="bg-zinc-50 p-3 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div><p class="font-bold text-xs">${s.nome}</p><p class="text-amber-600 font-bold text-[10px]">R$ ${s.preco}</p></div>
                        <div class="flex gap-2">
                            <button onclick="editarPrecoServico(${s.id}, '${s.nome}', ${s.preco})" class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[10px] font-bold uppercase">Editar</button>
                            <button onclick="removerServico(${s.id})" class="text-red-400">✕</button>
                        </div>
                    </div>`).join('');
            }

            // Agenda com Atraso
            const { data: agends } = await _supabase.from('agendamentos').select('*').order('dia').order('hora');
            if (agends) {
                document.getElementById('lista-agendamentos').innerHTML = agends.map(a => {
                    const minAtraso = calcularAtraso(a.dia, a.hora);
                    const atrasado = minAtraso !== null;
                    return `
                    <div class="p-4 border-l-8 ${atrasado ? 'border-red-500 bg-red-50' : 'border-amber-500 bg-white'} rounded-2xl shadow-sm flex justify-between items-center border">
                        <div>
                            <div class="flex items-center gap-2">
                                <p class="text-[10px] font-bold ${atrasado ? 'text-red-600' : 'text-amber-600'}">${a.dia.split('-').reverse().join('/')} às ${a.hora.substring(0,5)}</p>
                                ${atrasado ? `<span class="bg-red-600 text-white text-[8px] px-2 py-0.5 rounded-full font-black pulse-red uppercase">Atrasado ${minAtraso} min</span>` : ''}
                            </div>
                            <h4 class="font-bold text-base uppercase">${a.cliente}</h4>
                            <p class="text-[9px] text-zinc-400 font-black uppercase">${a.servico} | PROF: ${a.barbeiro}</p>
                        </div>
                        <button onclick="removerAgendamento(${a.id})" class="text-zinc-300 hover:text-red-500 text-2xl">✕</button>
                    </div>`;
                }).join('') || '<p class="text-zinc-400 italic text-center py-10">Agenda vazia.</p>';
            }
        }

        async function editarPrecoServico(id, nome, precoAtual) {
            const novo = prompt(`Novo preço para ${nome}:`, precoAtual);
            if (novo) {
                await _supabase.from('servicos').update({ preco: parseFloat(novo.replace(',', '.')) }).eq('id', id);
                renderizarTudo();
            }
        }

        async function adicionarBarbeiro() {
            const n = document.getElementById('novo-barbeiro-nome').value;
            if(n) { await _supabase.from('barbeiros').insert([{ nome: n }]); document.getElementById('novo-barbeiro-nome').value=''; renderizarTudo(); }
        }

        async function adicionarServico() {
            const n = document.getElementById('novo-servico-nome').value;
            const p = document.getElementById('novo-servico-preco').value;
            if(n && p) { await _supabase.from('servicos').insert([{ nome: n, preco: parseFloat(p) }]); renderizarTudo(); }
        }

        async function gerarGradeHorarios() {
            const d = document.getElementById('agendamento-dia').value;
            const b = document.getElementById('select-barbeiros-cliente').value;
            if (!d || !b) return;
            const { data: ocupados } = await _supabase.from('agendamentos').select('hora').eq('dia', d).eq('barbeiro', b);
            const horasOcupadas = ocupados ? ocupados.map(o => o.hora.substring(0, 5)) : [];
            const grade = document.getElementById('grade-horarios');
            grade.innerHTML = '';
            for (let h = 10; h <= 19; h++) {
                const hs = `${h.toString().padStart(2, '0')}:00`;
                const oc = horasOcupadas.includes(hs);
                const btn = document.createElement('button');
                btn.type = 'button'; btn.innerText = hs;
                btn.className = `p-3 rounded-2xl border-2 font-bold transition-all btn-horario ${oc ? '' : 'border-amber-500 text-amber-600'}`;
                btn.disabled = oc;
                btn.onclick = () => {
                    document.querySelectorAll('.btn-horario').forEach(x => x.classList.remove('horario-selecionado'));
                    btn.classList.add('horario-selecionado');
                    document.getElementById('horario-selecionado').value = hs;
                    document.getElementById('btn-confirmar').disabled = false;
                    document.getElementById('btn-confirmar').classList.replace('bg-zinc-300', 'bg-zinc-900');
                };
                grade.appendChild(btn);
            }
        }

        async function realizarAgendamento(e) {
            e.preventDefault();
            const d = {
                cliente: document.getElementById('cliente-nome').value,
                servico: document.getElementById('select-servicos').value,
                barbeiro: document.getElementById('select-barbeiros-cliente').value,
                dia: document.getElementById('agendamento-dia').value,
                hora: document.getElementById('horario-selecionado').value
            };
            await _supabase.from('agendamentos').insert([d]);
            alert("Agendado com sucesso!"); e.target.reset(); document.getElementById('grade-horarios').innerHTML=''; renderizarTudo();
        }

        async function removerAgendamento(id) { if(confirm("Concluir atendimento?")) { await _supabase.from('agendamentos').delete().eq('id', id); renderizarTudo(); } }
        async function removerBarbeiro(id) { if(confirm("Remover barbeiro?")) { await _supabase.from('barbeiros').delete().eq('id', id); renderizarTudo(); } }
        async function removerServico(id) { if(confirm("Remover serviço?")) { await _supabase.from('servicos').delete().eq('id', id); renderizarTudo(); } }

        setInterval(renderizarTudo, 60000);
        window.onload = renderizarTudo;
    </script>
</body>
</html>
