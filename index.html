<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotoExpress SaaS - Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.95);
            --primary-blue: #3b82f6;
            --text-main: #f8fafc;
            --accent-green: #10b981;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; margin: 0; }
        .glass-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 1.2rem; margin-bottom: 1rem; }
        .form-control { background-color: #1e293b !important; border: 1px solid #334155 !important; color: #fff !important; padding: 12px; }
        .btn-primary-custom { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border: none; padding: 15px; font-weight: bold; border-radius: 12px; width: 100%; color: white; }
        
        /* Estilo do Preço */
        .price-box { background: rgba(16, 185, 129, 0.1); border: 1px dashed var(--accent-green); color: var(--accent-green); padding: 15px; border-radius: 12px; text-align: center; margin: 15px 0; }
        
        .chat-box { background: #0a0f1d; border-radius: 12px; height: 200px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; border: 1px solid #334155; }
        .msg { margin-bottom: 8px; padding: 10px 14px; border-radius: 15px; max-width: 85%; }
        .msg-me { background: var(--primary-blue); align-self: flex-end; color: white; }
        .msg-other { background: #1e293b; align-self: flex-start; color: white; }

        #map { height: 250px; width: 100%; border-radius: 15px; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authSection" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 400px;">
        <h2 class="text-center text-primary fw-bold mb-4">MotoExpress</h2>
        <input type="email" id="loginEmail" class="form-control mb-2" placeholder="E-mail">
        <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Senha">
        <button id="btnLoginAction" class="btn-primary-custom">ENTRAR</button>
    </div>
</div>

<div id="mainApp" class="container py-3" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="fw-bold text-primary">MOTOEXPRESS</span>
        <button id="btnLogout" class="btn btn-sm btn-outline-danger">Sair</button>
    </div>

    <!-- AREA DO CLIENTE -->
    <div id="areaCliente" class="hidden">
        <div id="boxSolicitacao" class="glass-card">
            <input type="text" id="origem" class="form-control mb-2" placeholder="Local de retirada">
            <input type="text" id="destino" class="form-control mb-3" placeholder="Destino da entrega">
            
            <div id="displayPreco" class="price-box hidden">
                <small class="d-block">VALOR DO TRAJETO</small>
                <h3 class="m-0 fw-bold">R$ <span id="valorFinal">0,00</span></h3>
            </div>

            <button id="btnCalcular" class="btn btn-outline-primary w-100 mb-2">CALCULAR DISTÂNCIA</button>
            <button id="btnSolicitar" class="btn-primary-custom hidden">CHAMAR AGORA</button>
        </div>
        
        <div id="statusPedidoCliente"></div>

        <div id="chatCliente" class="glass-card hidden">
            <p class="small text-primary mb-2"><i class="bi bi-chat-dots"></i> Chat com o Entregador</p>
            <div id="boxChatCliente" class="chat-box mb-2"></div>
            <div class="input-group">
                <input type="text" id="inputChatCliente" class="form-control" placeholder="Diga algo...">
                <button class="btn btn-primary" onclick="enviarMensagem('cliente')"><i class="bi bi-send"></i></button>
            </div>
        </div>
        <div id="mapContainer" class="hidden"><div id="map"></div></div>
    </div>

    <!-- AREA DO MOTOBOY -->
    <div id="areaMotoboy" class="hidden">
        <div id="corridaAtivaMotoboy"></div>
        
        <div id="chatMotoboy" class="glass-card hidden">
            <p class="small text-primary mb-2"><i class="bi bi-chat-dots"></i> Falar com Cliente</p>
            <div id="boxChatMotoboy" class="chat-box mb-2"></div>
            <div class="input-group">
                <input type="text" id="inputChatMotoboy" class="form-control" placeholder="Escreva...">
                <button class="btn btn-primary" onclick="enviarMensagem('motoboy')"><i class="bi bi-send"></i></button>
            </div>
        </div>

        <p class="text-warning small fw-bold">PEDIDOS NA REGIÃO</p>
        <div id="listaDisponiveis"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY",
        authDomain: "motoexpress-887ba.firebaseapp.com",
        projectId: "motoexpress-887ba",
        storageBucket: "motoexpress-887ba.appspot.com",
        messagingSenderId: "931221356023",
        appId: "1:931221356023:web:7f6f5e4d3c2b1a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // REGRA DE NEGÓCIO
    const VALOR_KM = 2.50;
    const TAXA_MINIMA = 6.00;
    const SUA_COMISSAO = 0.20; // 20%

    let map, marker, pedidoAtivoId = null, precoGlobal = 0, tipoUsuario = null;

    onAuthStateChanged(auth, async u => {
        if(u) {
            const docU = await getDoc(doc(db, "usuarios", u.uid));
            if(docU.exists()) {
                tipoUsuario = docU.data().tipo;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                
                if(tipoUsuario === 'cliente') {
                    document.getElementById('areaCliente').classList.remove('hidden');
                    document.getElementById('areaMotoboy').classList.add('hidden');
                    monitorarCliente(u.uid);
                } else {
                    document.getElementById('areaMotoboy').classList.remove('hidden');
                    document.getElementById('areaCliente').classList.add('hidden');
                    monitorarMotoboy();
                }
            }
        }
    });

    // CÁLCULO DE DISTÂNCIA
    document.getElementById('btnCalcular').addEventListener('click', () => {
        const o = document.getElementById('origem').value;
        const d = document.getElementById('destino').value;
        if(!o || !d) return alert("Preencha origem e destino");

        // Simulação de cálculo (Em produção usar Geocoding + OSRM)
        const kmSimulado = (Math.random() * 8) + 1; 
        precoGlobal = Math.max(TAXA_MINIMA, kmSimulado * VALOR_KM);
        
        document.getElementById('valorFinal').innerText = precoGlobal.toFixed(2).replace('.', ',');
        document.getElementById('displayPreco').classList.remove('hidden');
        document.getElementById('btnSolicitar').classList.remove('hidden');
    });

    document.getElementById('btnSolicitar').addEventListener('click', async () => {
        const comissao = precoGlobal * SUA_COMISSAO;
        await addDoc(collection(db, "pedidos"), {
            origem: document.getElementById('origem').value,
            destino: document.getElementById('destino').value,
            valorTotal: precoGlobal,
            ganhoMotoboy: precoGlobal - comissao,
            status: "pendente",
            clienteId: auth.currentUser.uid,
            data: serverTimestamp()
        });
        document.getElementById('boxSolicitacao').classList.add('hidden');
    });

    function monitorarCliente(uid) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", uid)), snap => {
            const container = document.getElementById('statusPedidoCliente');
            container.innerHTML = "";
            let temAtivo = false;

            snap.forEach(d => {
                const p = d.data();
                if(p.status !== 'finalizado') {
                    temAtivo = true;
                    if(p.status === 'aceito') {
                        pedidoAtivoId = d.id;
                        document.getElementById('chatCliente').classList.remove('hidden');
                        document.getElementById('mapContainer').classList.remove('hidden');
                        monitorarChat(d.id, 'boxChatCliente');
                        carregarMapa(p.motoboyId);
                    }
                    container.innerHTML = `<div class="glass-card border-primary text-center">
                        <p class="m-0">Status: <b class="text-primary">${p.status.toUpperCase()}</b></p>
                        <small>Valor: R$ ${p.valorTotal.toFixed(2)}</small>
                    </div>`;
                }
            });
            if(!temAtivo) {
                document.getElementById('boxSolicitacao').classList.remove('hidden');
                document.getElementById('chatCliente').classList.add('hidden');
                document.getElementById('mapContainer').classList.add('hidden');
            }
        });
    }

    function monitorarMotoboy() {
        // GPS
        navigator.geolocation.watchPosition(p => {
            updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: p.coords.latitude, lng: p.coords.longitude });
        });

        // Pedidos Pendentes
        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente")), snap => {
            const lista = document.getElementById('listaDisponiveis'); lista.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                lista.innerHTML += `<div class="glass-card">
                    <div class="d-flex justify-content-between">
                        <b>R$ ${p.ganhoMotoboy.toFixed(2)}</b>
                        <small>Distância estimada: 4km</small>
                    </div>
                    <p class="small my-2">${p.destino}</p>
                    <button class="btn btn-success btn-sm w-100" onclick="aceitarPedido('${d.id}')">ACEITAR</button>
                </div>`;
            });
        });

        // Minha Corrida Ativa
        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const container = document.getElementById('corridaAtivaMotoboy');
            container.innerHTML = "";
            if(!snap.empty) {
                const d = snap.docs[0];
                pedidoAtivoId = d.id;
                document.getElementById('chatMotoboy').classList.remove('hidden');
                monitorarChat(d.id, 'boxChatMotoboy');
                container.innerHTML = `<div class="glass-card border-success">
                    <p class="text-success fw-bold m-0">ENTREGA EM ANDAMENTO</p>
                    <button class="btn btn-success w-100 mt-2" onclick="finalizarEntrega('${d.id}')">FINALIZAR E RECEBER</button>
                </div>`;
            } else {
                document.getElementById('chatMotoboy').classList.add('hidden');
                pedidoAtivoId = null;
            }
        });
    }

    function monitorarChat(id, boxId) {
        onSnapshot(query(collection(db, "pedidos", id, "chat"), orderBy("data", "asc")), snap => {
            const box = document.getElementById(boxId); box.innerHTML = "";
            snap.forEach(m => {
                const isMe = m.data().senderId === auth.currentUser.uid;
                box.innerHTML += `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">${m.data().texto}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.enviarMensagem = async (tipo) => {
        const input = document.getElementById(tipo === 'cliente' ? 'inputChatCliente' : 'inputChatMotoboy');
        if(input.value.trim() && pedidoAtivoId) {
            await addDoc(collection(db, "pedidos", pedidoAtivoId, "chat"), { texto: input.value, senderId: auth.currentUser.uid, data: serverTimestamp() });
            input.value = "";
        }
    };

    function carregarMapa(mid) {
        if (!map) {
            map = L.map('map').setView([-15, -47], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0, 0]).addTo(map);
        }
        onSnapshot(doc(db, "usuarios", mid), d => {
            if(d.exists()) {
                const pos = [d.data().lat, d.data().lng];
                marker.setLatLng(pos);
                map.setView(pos, 16);
            }
        });
    }

    window.aceitarPedido = id => updateDoc(doc(db, "pedidos", id), { status: "aceito", motoboyId: auth.currentUser.uid });
    window.finalizarEntrega = id => updateDoc(doc(db, "pedidos", id), { status: "finalizado" });
    
    document.getElementById('btnLoginAction').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginSenha').value).catch(e => alert("Dados incorretos"));
    });
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
